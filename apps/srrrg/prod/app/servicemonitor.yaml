apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: srrrg-prod-app
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: srrrg-prod-app
  namespaceSelector:
    matchNames:
      - srrrg
  endpoints:
    - port: app
      path: /actuator/prometheus
      interval: 30s
