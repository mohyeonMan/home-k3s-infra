apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kopic-ws-ingress
  namespace: kopic
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - kopic.app
        - www.kopic.app
  rules:
  - host: kopic.app
    http:
      paths:
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: kopic-ws
            port:
              number: 8080
  - host: www.kopic.app
    http:
      paths:
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: kopic-ws
            port:
              number: 8080
