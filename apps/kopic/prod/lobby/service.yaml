apiVersion: v1
kind: Service
metadata:
  name: kopic-lobby
  labels:
    app: kopic-lobby
spec:
  type: ClusterIP
  selector:
    app: kopic-lobby
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: kopic-lobby-headless
  labels:
    app: kopic-lobby
spec:
  clusterIP: None
  selector:
    app: kopic-lobby
  ports:
  - name: http
    port: 8080
    targetPort: 8080
