apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kopic-client-ingress
  namespace: kopic
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - kopic.app
        - www.kopic.app
  rules:
    - host: kopic.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kopic-client
                port:
                  number: 80
    - host: www.kopic.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kopic-client
                port:
                  number: 80
