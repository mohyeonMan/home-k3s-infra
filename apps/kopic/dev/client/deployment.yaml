apiVersion: apps/v1
kind: Deployment
metadata:
  name: kopic-dev-client
  labels:
    app: kopic-dev-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kopic-dev-client
  template:
    metadata:
      labels:
        app: kopic-dev-client
    spec:
      containers:
      - name: kopic-dev-client
        image: ghcr.io/mohyeonman/kopic-client
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
