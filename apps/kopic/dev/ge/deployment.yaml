apiVersion: apps/v1
kind: Deployment
metadata:
  name: kopic-dev-ge
spec:
  selector:
    matchLabels:
      app: kopic-dev-ge
  template:
    metadata:
      labels:
        app: kopic-dev-ge
    spec:
      terminationGracePeriodSeconds: 4500
      containers:
      - name: kopic-dev-ge
        image: ghcr.io/mohyeonman/kopic-ge-k3s
        ports:
        - containerPort: 8080
          name: app
        resources:
          requests:
            cpu: 300m
            memory: 512Mi
          limits:
            memory: 2Gi
        env:
        - name: SPRING_RABBITMQ_HOST
          value: rabbitmq.rabbitmq.svc.cluster.local
        - name: SPRING_RABBITMQ_PORT
          value: "5672"
        - name: SPRING_RABBITMQ_USERNAME
          valueFrom:
            secretKeyRef:
              name: rabbitmq-auth
              key: rabbitmq-username
        - name: SPRING_RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rabbitmq-auth
              key: rabbitmq-password
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: KOPIC_NODE_ID
          value: "$(POD_NAME)-$(POD_UID)"
        - name: KOPIC_SHUTDOWN_PHASE_TIMEOUT
          value: "70m"
        - name: KOPIC_DRAIN_TIMEOUT
          value: "3600s"
        - name: KOPIC_DRAIN_POLL_INTERVAL
          value: "60s"
        - name: KOPIC_DRAIN_WAITING_ROOM_DELETE_DELAY
          value: "300s"
        - name: KOPIC_DRAIN_IN_GAME_NOTIFY_INTERVAL
          value: "180s"
        - name: KOPIC_REDIS_HOST
          value: redis.redis.svc.cluster.local
        - name: KOPIC_REDIS_PORT
          value: "6379"
        - name: KOPIC_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-auth
              key: redis-password
        - name: KOPIC_REDIS_ENABLED
          value: "true"
        - name: KOPIC_REDIS_KEY_GE_PREFIX
          value: "kopic-dev.ge:"
        - name: KOPIC_REDIS_KEY_GE_LOAD
          value: "kopic-dev.ge:load"
        - name: KOPIC_REDIS_KEY_QUICK_AVAILABLE
          value: "kopic-dev.quick:available"
        - name: KOPIC_REDIS_KEY_QUICK_GE_PREFIX
          value: "kopic-dev.quick:ge:"
        - name: KOPIC_REDIS_KEY_ROOM_CODE_PREFIX
          value: "kopic-dev.roomcode:"
        - name: KOPIC_RABBIT_OUTBOUND_EXCHANGE
          value: kopic-dev.exchange
        - name: KOPIC_RABBIT_INBOUND_QUEUE_PREFIX
          value: kopic-dev.ge.event.
        - name: KOPIC_RABBIT_INBOUND_ROUTING_KEY_PREFIX
          value: kopic-dev.ge.route.
        - name: KOPIC_RABBIT_OUTBOUND_ROUTING_KEY_PREFIX
          value: kopic-dev.ws.route.
