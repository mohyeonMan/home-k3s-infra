apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kopic-dev-ws
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kopic-dev-ws
  minReplicas: 2
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: AverageValue
          averageValue: 2Gi
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 3600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 1800
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
