apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kopic-client-ingress
  namespace: kopic
spec:
  ingressClassName: traefik
  rules:
  - host: jhhomehub.gonetis.com
    http:
      paths:
      - path: /kopic
        pathType: Prefix
        backend:
          service:
            name: kopic-client
            port:
              number: 80
