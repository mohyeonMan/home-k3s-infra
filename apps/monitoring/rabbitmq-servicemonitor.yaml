apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rabbitmq
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - rabbitmq
  selector:
    matchLabels:
      app: rabbitmq
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s