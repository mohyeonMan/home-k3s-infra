apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-logs-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  cluster-logs-ops.json: |-
    {
      "title": "Cluster Logs Operations",
      "tags": ["logs", "loki", "operations"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "15s",
      "editable": true,
      "graphTooltip": 2,
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": { "type": "loki", "uid": "loki" },
            "query": "label_values(namespace)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": { "selected": true, "text": "All", "value": "$__all" }
          },
          {
            "name": "environment",
            "label": "Environment",
            "type": "custom",
            "query": "prod : kopic-(client|ge|ws).*, dev : kopic-dev-.*, all : .*",
            "options": [
              { "selected": true, "text": "prod", "value": "kopic-(client|ge|ws).*" },
              { "selected": false, "text": "dev", "value": "kopic-dev-.*" },
              { "selected": false, "text": "all", "value": ".*" }
            ],
            "current": { "selected": true, "text": "prod", "value": "kopic-(client|ge|ws).*" }
          },
          {
            "name": "pod",
            "label": "Pod",
            "type": "query",
            "datasource": { "type": "loki", "uid": "loki" },
            "query": "label_values({namespace=~\"${namespace:regex}\",pod=~\"${environment:raw}\"}, pod)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": { "selected": true, "text": "All", "value": "$__all" }
          },
          {
            "name": "container",
            "label": "Container",
            "type": "query",
            "datasource": { "type": "loki", "uid": "loki" },
            "query": "label_values({namespace=~\"${namespace:regex}\",pod=~\"${environment:raw}\",pod=~\"${pod:regex}\"}, container)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": { "selected": true, "text": "All", "value": "$__all" }
          },
          {
            "name": "search",
            "label": "Search Regex",
            "type": "textbox",
            "query": "",
            "current": { "text": "", "value": "" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Total Logs / Sec",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate({namespace=~\"${namespace:regex}\",pod=~\"${environment:raw}\",pod=~\"${pod:regex}\",container=~\"${container:regex}\"}[$__interval]))"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 200 },
                  { "color": "red", "value": 600 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Error Logs / Sec",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate({namespace=~\"${namespace:regex}\",pod=~\"${environment:raw}\",pod=~\"${pod:regex}\",container=~\"${container:regex}\"} |~ \"(?i)(error|exception|panic|fatal|failed|timeout)\"[$__interval]))"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "decimals": 3,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 0.5 },
                  { "color": "red", "value": 2 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Error Ratio",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate({namespace=~\"${namespace:regex}\",pod=~\"${environment:raw}\",pod=~\"${pod:regex}\",container=~\"${container:regex}\"} |~ \"(?i)(error|exception|panic|fatal|failed|timeout)\"[$__interval])) / clamp_min(sum(rate({namespace=~\"${namespace:regex}\",pod=~\"${environment:raw}\",pod=~\"${pod:regex}\",container=~\"${container:regex}\"}[$__interval])), 1e-9)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 3,
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 0.01 },
                  { "color": "red", "value": 0.03 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Unique Active Pods (5m)",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(count(count_over_time({namespace=~\"${namespace:regex}\",pod=~\"${environment:raw}\",pod=~\"${pod:regex}\",container=~\"${container:regex}\"}[5m])) by (pod))"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 50 },
                  { "color": "red", "value": 150 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Log Throughput by Namespace",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace) (rate({namespace=~\"${namespace:regex}\",pod=~\"${environment:raw}\",pod=~\"${pod:regex}\",container=~\"${container:regex}\"}[$__interval]))"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "min": 0,
              "lineWidth": 2
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom"
            },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Top 10 Pods by Log Throughput",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(10, sum by (namespace, pod) (rate({namespace=~\"${namespace:regex}\",pod=~\"${environment:raw}\",pod=~\"${pod:regex}\",container=~\"${container:regex}\"}[$__interval])))"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "min": 0,
              "lineWidth": 2
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom"
            },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 7,
          "type": "bargauge",
          "title": "Top Noisy Containers (30m Count)",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(12, sum by (namespace, pod, container) (count_over_time({namespace=~\"${namespace:regex}\",pod=~\"${environment:raw}\",pod=~\"${pod:regex}\",container=~\"${container:regex}\"}[30m])))"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 2000 },
                  { "color": "red", "value": 10000 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "showUnfilled": true
          }
        },
        {
          "id": 8,
          "type": "bargauge",
          "title": "Top Error Sources (30m Count)",
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(12, sum by (namespace, pod, container) (count_over_time({namespace=~\"${namespace:regex}\",pod=~\"${environment:raw}\",pod=~\"${pod:regex}\",container=~\"${container:regex}\"} |~ \"(?i)(error|exception|panic|fatal|failed|timeout)\"[30m])))"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 50 },
                  { "color": "red", "value": 200 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "showUnfilled": true
          }
        },
        {
          "id": 9,
          "type": "logs",
          "title": "Live Logs (Search Regex Applied)",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 18 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=~\"${namespace:regex}\",pod=~\"${environment:raw}\",pod=~\"${pod:regex}\",container=~\"${container:regex}\"} |~ \"${search}\""
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true
          }
        },
        {
          "id": 10,
          "type": "logs",
          "title": "Recent Errors",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 28 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=~\"${namespace:regex}\",pod=~\"${environment:raw}\",pod=~\"${pod:regex}\",container=~\"${container:regex}\"} |~ \"(?i)(error|exception|panic|fatal|failed|timeout)\""
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true
          }
        }
      ]
    }
